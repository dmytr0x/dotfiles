"$schema" = "https://starship.rs/config-schema.json"

format = """
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$aws\
$docker_context\
$jobs\
$cmd_duration\
$time\
$line_break\
$character"""

palette = "catppuccin_mocha"

add_newline = false
scan_timeout = 100
command_timeout = 500
follow_symlinks = false

[time]
disabled = false
time_format = "%R"
format = "[[  $time ](fg:yellow bg:foam)]($style)"

[directory]
style = "sapphire"
format = "[$path ]($style)"
truncation_length = 5
truncation_symbol = "…/"
truncate_to_repo = false

[fill]
symbol = " "

[python]
style = "teal"
symbol = " "
format = '[${symbol}(${version} )(\($virtualenv\) )]($style)'

[lua]
symbol = " "

[nodejs]
style = "blue"
symbol = " "

[golang]
style = "blue"
symbol = " "

[haskell]
style = "blue"
symbol = " "

[rust]
style = "orange"
symbol = " "

[ruby]
style = "blue"
symbol = " "

[package]
symbol = "󰏗 "

[aws]
symbol = " "
style = "yellow"
format = '[$symbol($profile )(\[$duration\] )]($style)'

[docker_context]
symbol = " "
style = "fg:#06969A"
format = "[$symbol]($style) $path"
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_extensions = ["Dockerfile"]

[jobs]
symbol = " "
style = "red"
number_threshold = 1
format = "[$symbol]($style)"

[cmd_duration]
min_time = 500
style = "fg:gray"
format = "[$duration]($style)"

[character]
success_symbol = "[❯](bold fg:green)"
error_symbol = "[❯](bold fg:red)"

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL=" "
else
    GIT_REMOTE_SYMBOL=" "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true

[git_branch]
symbol = "[](base) "
style = "fg:lavender bg:base"
format = "  [$symbol$branch]($style)[](base)"

[git_status]
format = "[$staged$modified$deleted$renamed$conflicted$ahead_behind]($style)"
# options available for format
staged = "[✓${count} ](green)"
modified = "[!${count} ](yellow)"
renamed = "[»${count} ](blue)"
deleted = "[-${count} ](red)"
untracked = "[?${count} ](sapphire)"
stashed = "[≡${count} ](lavender)"
conflicted = "[✖${count} ](red bold)"

ahead = "[⇡${count} ](teal)"
behind = "[⇣${count} ](peach)"
diverged = "[⇕⇡${ahead_count}⇣${behind_count} ](mauve)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "⛓ "
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " ([$output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true

[palettes.catppuccin_mocha]
# --- background ---
crust = "#11111b"
mantle = "#181825"
base = "#1e1e2e"   # git branch bg

overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"

surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"

# --- text ---
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"

# --- accents (catppuccin_mocha) ---
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"  # git branch fg
