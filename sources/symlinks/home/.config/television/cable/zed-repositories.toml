[metadata]
name = "zed-repositories"
description = "Select a Git repository, then show its worktrees"
requirements = ["find-git-roots", "git", "tv"]

[source]
command = """
{
  # Traverse the Work directory to find the Git repositories within it
  find-git-roots \
  ~/Work \
  --min-depth 2 \
  --max-depth 3 \
  --exclude node_modules \
  --exclude .venv \
  --exclude .worktrees

  # Manually added repositories
  printf '%s\n' \
   "$HOME/dotfiles"

} | sort -u | while IFS= read -r repo_path; do
  repo_path="${repo_path%/}"
  repo_name="${repo_path##*/}"
  printf '%s\t%s\n' "$repo_name" "$repo_path"
done
"""
display = "{split:\\t:0}"
output = "{split:\\t:1}"
frecency = true

[preview]
command = "git -C '{split:\\t:1}' worktree list"
header = "{split:\\t:0}"

[ui]
layout = "portrait"
input_header = "Search Git repositories"
input_prompt = "> "

[ui.preview_panel]
hidden = false
size = 45

[keybindings]
enter = "actions:worktrees"
f12 = "actions:worktrees"
ctrl-y = "actions:copy"

[actions.worktrees]
description = "Show worktrees for selected repository"
command = "ZED_SELECTED_REPO='{split:\\t:1}' ZED_SELECTED_REPO_NAME='{split:\\t:0}' tv zed-worktrees"
mode = "execute"

[actions.copy]
description = "Copy repository path to clipboard"
command = "printf '%s' '{split:\\t:1}' | pbcopy"
mode = "execute"
